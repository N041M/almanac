[package]
name = "almanac"
version = "0.0.0"
description = "Almanac — local-first personal calendar (desktop shell)"
edition = "2021"

[lib]
name = "almanac_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-sql = { version = "2", features = ["sqlite"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
